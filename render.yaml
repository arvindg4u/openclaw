services:
  - type: web
    name: openclaw
    runtime: docker
    plan: free
    healthCheckPath: /health
    startCommand: /app/scripts/render-entrypoint.sh
    envVars:
      - key: OPENCLAW_GATEWAY_PORT
        value: "8080"
      - key: OPENCLAW_STATE_DIR
        value: /home/node/.openclaw
      - key: OPENCLAW_WORKSPACE_DIR
        value: /home/node/.openclaw/workspace
      - key: OPENCLAW_GATEWAY_TOKEN
        generateValue: true
      # R2 / rclone backup configuration
      - key: R2_BUCKET
        value: openclaw-backup
      - key: R2_PREFIX
        value: openclaw-state
      - key: RCLONE_CONFIG_R2_TYPE
        value: s3
      - key: RCLONE_CONFIG_R2_PROVIDER
        value: Cloudflare
      - key: RCLONE_CONFIG_R2_REGION
        value: auto
      - key: RCLONE_CONFIG_R2_ACL
        value: private
      - key: RCLONE_CONFIG_R2_ENDPOINT
        value: https://575e29bc16ae64a8ce64c6cf4d5c2d52.r2.cloudflarestorage.com
      # Backup interval in seconds (3600 = 1 hour)
      - key: BACKUP_INTERVAL
        value: "3600"
